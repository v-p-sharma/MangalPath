      subject: 'धन्यवाद, हमने आपका अनुरोध प्राप्त कर लिया है'
      body: "<div style=\"margin:0;padding:20px;background:#f5f7fa;font-family:Arial,Helvetica,sans-serif;\">\r\n\r\n  <table role=\"presentation\" cellspacing=\"0\" cellpadding=\"0\" border=\"0\" width=\"100%\" style=\"max-width:650px;margin:auto;background:#ffffff;border-radius:10px;border:1px solid #e5e7eb;\">\r\n    <tr>\r\n      <td style=\"background:#0d6efd;padding:25px;text-align:center;border-radius:10px 10px 0 0;\">\r\n        <h2 style=\"margin:0;color:#ffffff;font-size:28px;\">\r\n          धन्यवाद!\r\n        </h2>\r\n      </td>\r\n    </tr>\r\n\r\n    <tr>\r\n      <td style=\"padding:35px;line-height:1.8;color:#444444;font-size:16px;\">\r\n\r\n        <p style=\"margin-top:0;\">\r\n          नमस्ते <strong>[webform_submission:values:name]</strong>,\r\n        </p>\r\n\r\n        <p>\r\n          हमसे संपर्क करने के लिए आपका हार्दिक धन्यवाद।\r\n        </p>\r\n\r\n        <p>\r\n          हमें आपकी <strong>[webform_submission:values:service_required]</strong> सेवा से संबंधित जानकारी सफलतापूर्वक प्राप्त हो गई है।\r\n        </p>\r\n\r\n        <p>\r\n          हमारी विशेषज्ञ टीम आपके अनुरोध की समीक्षा कर रही है। जल्द ही हमारा प्रतिनिधि आपके दिए गए मोबाइल नंबर या ईमेल पर आपसे संपर्क करेगा और आपकी आवश्यकता के अनुसार उचित मार्गदर्शन प्रदान करेगा।\r\n        </p>\r\n\r\n        <table role=\"presentation\" cellspacing=\"0\" cellpadding=\"8\" border=\"0\" width=\"100%\" style=\"margin:25px 0;background:#f8f9fa;border:1px solid #e9ecef;border-radius:8px;\">\r\n          <tr>\r\n            <td><strong>नाम:</strong></td>\r\n            <td>[webform_submission:values:name]</td>\r\n          </tr>\r\n          <tr>\r\n            <td><strong>मोबाइल:</strong></td>\r\n            <td>[webform_submission:values:mobile_number]</td>\r\n          </tr>\r\n          <tr>\r\n            <td><strong>ईमेल:</strong></td>\r\n            <td>[webform_submission:values:email_address]</td>\r\n          </tr>\r\n          <tr>\r\n            <td><strong>सेवा:</strong></td>\r\n            <td>[webform_submission:values:service_required]</td>\r\n          </tr>\r\n        </table>\r\n\r\n        <p>\r\n          यदि आपने यह अनुरोध गलती से भेजा है, तो आप इस ईमेल को नज़रअंदाज़ कर सकते हैं।\r\n        </p>\r\n\r\n        <p>\r\n          एक बार फिर आपका धन्यवाद। हमें आपकी सेवा करने का अवसर देने के लिए हम आभारी हैं।\r\n        </p>\r\n\r\n        <p style=\"margin-bottom:0;\">\r\n          सादर,<br>\r\n          <strong>Customer Support Team</strong><br>\r\n          <strong>ManagalPath</strong>\r\n        </p>\r\n\r\n      </td>\r\n    </tr>\r\n\r\n    <tr>\r\n      <td style=\"background:#f3f4f6;padding:18px;text-align:center;color:#777777;font-size:13px;border-radius:0 0 10px 10px;\">\r\n        © 2026 MangalPath. सभी अधिकार सुरक्षित।\r\n      </td>\r\n    </tr>\r\n  </table>\r\n\r\n</div>\r\n\r\n"
