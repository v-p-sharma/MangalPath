mangalpath_payment.settings:

  type: config_object

  label: 'MangalPath Payment Settings'

  mapping:

    key_id:
      type: string
      label: 'Razorpay Key ID'

    key_secret:
      type: string
      label: 'Razorpay Key Secret'

    webhook_secret:
      type: string
      label: 'Webhook Secret'

    mode:
      type: string
      label: 'Payment Mode'

    currency:
      type: string
      label: 'Currency'

    listing_amount:
      type: integer
      label: 'Listing Amount'