partner_dashboard.property_selling:
  path: '/add/new-property'
  defaults:
    _controller: '\Drupal\partner_dashboard\Controller\Property_selling_controller::PropertyForm'
    _title: 'Add New Property for sell or Rent'
  requirements:
    _permission: 'access content'
partner_dashboard.vehicle_selling:
  path: '/add/new-vehicle'
  defaults:
    _controller: '\Drupal\partner_dashboard\Controller\Vehicle_selling_controller::VehicleForm'
    _title: 'Add New Property for sell or Rent'
  requirements:
    _permission: 'access content'
partner_dashboard.property_selling_form:
  path: '/add/form/new-property'
  defaults:
    _form: '\Drupal\partner_dashboard\Form\Property_selling'
    _title: 'Property Registration'
  requirements:
    _permission: 'access content'
    _access: 'TRUE'
partner_dashboard.vehicle_selling_form:
  path: '/add/form/new-vehicles'
  defaults:
    _form: '\Drupal\partner_dashboard\Form\Vehicle_selling_rental'
    _title: 'Vehicle Registration'
  requirements:
    _permission: 'access content'
    _access: 'TRUE'
partner_dashboard.loan_application:
  path: '/loan-application'
  defaults:
    _title: 'Loan Application'
    _form: '\Drupal\partner_dashboard\Form\LoanApplicationForm'
  requirements:
    _permission: 'access content'