services:
  mangalpath_module.redirect_subscriber:
    class: Drupal\mangalpath_module\EventSubscriber\AnonymousRedirectSubscriber
    arguments: ['@current_user']
    tags:
      - { name: event_subscriber }

  mangalpath_module.dashboard_statistics:
    class: Drupal\mangalpath_module\Service\DashboardStatisticsService
    arguments:
      - '@entity_type.manager'
      - '@current_user'